name: CD — Deploy to Laravel Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:        # allows manual trigger from GitHub UI

# Cancel any in-progress deploy if a new push comes in
concurrency:
  group: laravel-cloud-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Laravel Cloud
    runs-on: ubuntu-latest
    needs: []               # runs independently; gate with CI if you prefer
    environment: production

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: 📦 Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: 📥 Install Composer dependencies (production)
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📥 Install npm dependencies
        run: npm ci

      - name: 🏗️ Build frontend assets
        run: npm run build

      - name: ☁️ Deploy to Laravel Cloud
        run: |
          composer global require laravel/cloud-cli
          ~/.composer/vendor/bin/cloud deploy \
            --token="${{ secrets.LARAVEL_CLOUD_TOKEN }}" \
            --project="${{ secrets.LARAVEL_CLOUD_PROJECT }}" \
            --environment="production" \
            --wait