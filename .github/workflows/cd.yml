name: CD — Deploy to Laravel Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: laravel-cloud-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Laravel Cloud
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: 📦 Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: 📥 Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📥 Install npm dependencies
        run: npm ci

      - name: 🏗️ Build frontend assets
        run: npm run build

      - name: ☁️ Deploy to Laravel Cloud
        env:
          LARAVEL_CLOUD_TOKEN: ${{ secrets.LARAVEL_CLOUD_TOKEN }}
        run: |
          ~/.composer/vendor/bin/cloud deploy \
            --project="${{ secrets.LARAVEL_CLOUD_PROJECT }}" \
            --environment="production" \
            --no-interaction \
            --wait

      - name: 🗃️ Run migrations
        run: php artisan migrate --force

      - name: ⚡ Optimize Laravel
        run: |
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache